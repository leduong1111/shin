<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='50' font-size='52'%3E%F0%9F%9A%80%3C/text%3E%3C/svg%3E" />
<style> 
:root{
  --bg:#02030A; --fg:#e6ffff; --cyan:#00ffff; --vio:#8a2be2;
  --glow:0 0 25px rgba(0,255,255,.45),0 0 60px rgba(138,43,226,.25);
  --card-bg:rgba(2,8,20,.48);
}
*{ margin:0; padding:0; box-sizing:border-box; }
html,body{
  height:100%; margin:0; background:var(--bg); color:var(--fg);
  font-family:system-ui,Segoe UI,Inter,Roboto,Arial,sans-serif;
  overflow: auto;
}
.wrap{position:relative; z-index:2; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:28px}
.shell{width:100%; max-width:1100px; display:grid; grid-template-columns:1.1fr .9fr; gap:26px}
@media (max-width:900px){ .shell{grid-template-columns:1fr; gap:20px} }

.panel{padding:22px; border-radius:18px; background:var(--card-bg); backdrop-filter:saturate(150%) blur(12px); box-shadow:var(--glow); transition:.3s}
.panel:hover{box-shadow:0 0 50px var(--cyan),0 0 100px var(--vio); transform:scale(1.02)}

.head{display:flex; align-items:center; gap:16px}
.avatar{position:relative; width:96px; height:96px; border-radius:50%; overflow:hidden; border:2px solid var(--cyan); box-shadow:var(--glow); cursor:pointer; transition:.3s}
.avatar::after{content:""; position:absolute; inset:-6px; border-radius:50%;
  background:conic-gradient(from 0deg, rgba(0,255,255,.25), rgba(138,43,226,.25), rgba(0,255,255,.25));
  filter:blur(14px); z-index:-1; animation:halo 6s linear infinite}
@keyframes halo{to{transform:rotate(360deg)}}
.avatar:hover{box-shadow:0 0 60px var(--cyan),0 0 100px var(--vio); transform:scale(1.08)}
.avatar img{width:100%; height:100%; object-fit:cover}
.online{position:absolute; right:6px; bottom:6px; width:12px; height:12px; border-radius:50%; background:linear-gradient(135deg,var(--cyan),var(--vio)); box-shadow:0 0 10px var(--cyan)}

.title h1{margin:0; font-size:1.6rem; letter-spacing:.3px; color:var(--cyan); text-shadow:0 0 14px currentColor; display:flex; align-items:center; gap:8px}
.badge-verify{display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px}
.badge-verify svg{display:block}

.sub{color:#bfefff; opacity:.9}
.badges{display:flex; flex-wrap:wrap; gap:8px; margin:12px 0 6px}
.badge{font-size:.9rem; padding:6px 10px; border-radius:10px; background:rgba(0,0,0,.25); border:1px solid rgba(0,255,255,.35); color:var(--fg)}
.badge a{color:inherit; text-decoration:none}
.bio{margin:12px 0 16px; color:#dfffff}

.actions{display:grid; grid-template-columns:repeat(2,1fr); gap:10px}
.btn{padding:12px 10px; border-radius:12px; border:1.6px solid var(--cyan); background:transparent; color:var(--cyan); font-weight:700; cursor:pointer; transition:.25s transform,color,box-shadow; text-align:center}
.btn:hover{transform:translateY(-2px); background:radial-gradient(120% 120% at 50% 10%, rgba(0,255,255,.22), rgba(138,43,226,.22)); box-shadow:var(--glow); color:#001217}

.section{margin:4px 0 12px; color:var(--cyan); font-weight:800; text-shadow:0 0 10px var(--cyan); position:relative}
.section::after{content:""; position:absolute; left:0; bottom:-6px; width:72px; height:3px; background:linear-gradient(90deg,var(--cyan),var(--vio)); border-radius:2px}
.grid{display:grid; grid-template-columns:repeat(3,1fr); gap:12px}
@media (max-width:900px){ .grid{grid-template-columns:repeat(2,1fr)} }
@media (max-width:520px){ .grid{grid-template-columns:1fr} }
.tile{display:flex; justify-content:center; align-items:center; gap:8px; padding:14px 12px; border-radius:14px; text-decoration:none; color:var(--fg); background:rgba(0,0,0,.35); border:1px solid rgba(0,255,255,.25); transition:.25s all}
.tile:hover{background:radial-gradient(circle at center, rgba(0,255,255,.25), rgba(138,43,226,.2)); box-shadow:var(--glow); transform:scale(1.05)}
.footer{text-align:center; margin-top:18px; color:#bfefff}

.toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:linear-gradient(135deg,var(--cyan),var(--vio)); color:#001217; padding:10px 16px; border-radius:12px; font-weight:800; display:none; z-index:9999; box-shadow:var(--glow)}

.view-counter{
  position:fixed; bottom:22px; right:22px; z-index:1000;
  display:flex; align-items:center; gap:9px;
  padding:9px 16px; border-radius:14px;
  background:rgba(2,8,20,.78); backdrop-filter:blur(14px);
  border:1px solid rgba(0,255,255,.35);
  box-shadow:0 0 18px rgba(0,255,255,.18), 0 0 40px rgba(138,43,226,.14);
  font-size:.82rem; color:#bfefff;
  transition:.3s; cursor:default; user-select:none;
  font-family:system-ui, monospace;
}
.view-counter:hover{
  box-shadow:0 0 32px rgba(0,255,255,.45), 0 0 70px rgba(138,43,226,.3);
  border-color:var(--cyan);
}
.vc-dot{
  width:7px; height:7px; border-radius:50%; flex-shrink:0;
  background:var(--cyan); box-shadow:0 0 8px var(--cyan);
  animation:pulse-dot 1.8s ease-in-out infinite;
}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.35;transform:scale(.65)}}
.vc-label{opacity:.75; white-space:nowrap}
.vc-num{
  font-weight:800; color:var(--cyan);
  text-shadow:0 0 10px var(--cyan);
  font-size:.95rem; min-width:38px; text-align:right;
}
@media (max-width:600px){
  .view-counter{bottom:14px; right:14px; padding:6px 12px; gap:6px;}
  .vc-num{font-size:.85rem; min-width:32px;}
  .vc-label{font-size:.7rem;}
}

#galaxyCanvas{
  position:fixed; top:0; left:0; width:100%; height:100%; 
  z-index:0; display:block;
  background: radial-gradient(circle at 30% 20%, #03041f, #000000);
}
</style>
</head>
<body>

<div class="wrap">

      </div>

      <div class="actions">
        <a class="btn" href="https://www.facebook.com/shin.isme.06" target="_blank" rel="noopener">LIÊN HỆ</a>

  <span class="vc-label">👁 Lượt xem</span>
  <span class="vc-num" id="vcNum">0</span>

<script>
// ========== 1. TỐI ƯU LƯỢT XEM: HIỂN THỊ NGAY, CẬP NHẬT SAU ==========
const vcSpan = document.getElementById('vcNum');
// Hiển thị số từ localStorage ngay lập tức (nếu có) để không bị trống
let cachedViews = localStorage.getItem('td_views_cached');
if (cachedViews && !isNaN(parseInt(cachedViews))) {
  vcSpan.innerText = parseInt(cachedViews).toLocaleString('vi-VN');
} else {
  vcSpan.innerText = '...';
}

// Gọi API countapi để tăng và lấy số mới (bất đồng bộ, không làm chậm giao diện)
(async function updateGlobalView() {
  try {
    const res = await fetch('https://api.countapi.xyz/hit/tranduongdev_profile_2026/views', {
      headers: { 'Accept': 'application/json' }
    });
    if (!res.ok) throw new Error();
    const data = await res.json();
    if (data && typeof data.value === 'number') {
      const newCount = data.value;
      vcSpan.innerText = newCount.toLocaleString('vi-VN');
      localStorage.setItem('td_views_cached', newCount);
    } else throw new Error();
  } catch (err) {
    // Fallback: tăng local count nhưng vẫn hiển thị
    let local = localStorage.getItem('td_views_local');
    let count = local ? parseInt(local, 10) : 0;
    count++;
    localStorage.setItem('td_views_local', count);
    vcSpan.innerText = count.toLocaleString('vi-VN');
    localStorage.setItem('td_views_cached', count);
    document.querySelector('.view-counter').title = 'Lượt xem (local)';
  }
})();

// ========== 2. LẤY NHẠC & AVATAR TỪ ARCHIVE (KHÔNG LÀM CHẬM TRANG) ==========
const MUSIC_ID = 'vstra-ai-ngoai-anh-official-audio-320-kbps';
const AVATAR_ID = 'a476780b6ec4049e87c2d808650f7aea';

async function fetchArchiveFile(identifier, fileType = 'audio') {
  try {
    const res = await fetch(`https://archive.org/metadata/${identifier}`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    const files = data.files || [];
    if (fileType === 'audio') {
      const mp3File = files.find(f => f.name.toLowerCase().endsWith('.mp3') || f.name.toLowerCase().endsWith('.m4a'));
      if (mp3File) return `https://archive.org/download/${identifier}/${mp3File.name}`;
    } else if (fileType === 'image') {
      const imgFile = files.find(f => /\.(jpg|jpeg|png|gif|webp)$/i.test(f.name));
      if (imgFile) return `https://archive.org/download/${identifier}/${imgFile.name}`;
    }
    return null;
  } catch (e) {
    console.warn(`Lỗi lấy file từ ${identifier}:`, e);
    return null;
  }
}

(async function loadMedia() {
  const audioEl = document.getElementById('bgAudio');
  const musicBtn = document.getElementById('toggleMusicBtn');
  const musicLink = await fetchArchiveFile(MUSIC_ID, 'audio');
  if (musicLink) {
    audioEl.src = musicLink;
    audioEl.load();
  } else {
    musicBtn.disabled = true;
    musicBtn.textContent = '❌ Nhạc lỗi';
  }

  const avatarImg = document.getElementById('avatarImg');
  const imgLink = await fetchArchiveFile(AVATAR_ID, 'image');
  if (imgLink) avatarImg.src = imgLink;
})();

// ========== 3. ĐIỀU KHIỂN NHẠC ==========
const audio = document.getElementById('bgAudio');
const musicBtn = document.getElementById('toggleMusicBtn');
let isPlaying = false;

musicBtn.addEventListener('click', async () => {
  if (!audio.src) {
    showToast('⚠️ Nhạc chưa sẵn sàng, thử lại sau');
    return;
  }
  if (isPlaying) {
    audio.pause();
    musicBtn.textContent = '🔈 Bật nhạc';
    isPlaying = false;
  } else {
    try {
      await audio.play();
      musicBtn.textContent = '🔊 Tắt nhạc';
      isPlaying = true;
    } catch (err) {
      showToast('⚠️ Không thể phát nhạc, hãy thử lại');
    }
  }
});

// ========== 4. COPY & TOAST ==========
const toastEl = document.getElementById('toast');
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.style.display = 'block';
  clearTimeout(window.toastTimeout);
  window.toastTimeout = setTimeout(() => toastEl.style.display = 'none', 1500);
}
function copyText(text, successMsg = 'Đã copy!') {
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast(successMsg));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    showToast(successMsg);
  }
}
document.getElementById('copyMail')?.addEventListener('click', (e) => {
  e.preventDefault();
  copyText('leshink6@gmail.com', '📧 Đã copy email');
});
document.getElementById('copyPhone')?.addEventListener('click', (e) => {
  e.preventDefault();
  copyText('0343063275', '📞 Đã copy số điện thoại');
});

// ========== 5. AVATAR THẢ TIM ==========
const avatarDiv = document.getElementById('avatar');
avatarDiv.addEventListener('click', (e) => {
  const rect = avatarDiv.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  for (let i = 0; i < 7; i++) spawnHeart(x, y);
});
function spawnHeart(x, y) {
  const heart = document.createElement('div');
  heart.textContent = '💖';
  heart.style.position = 'absolute';
  heart.style.left = x + 'px';
  heart.style.top = y + 'px';
  heart.style.fontSize = (14 + Math.random() * 12) + 'px';
  heart.style.opacity = '1';
  heart.style.pointerEvents = 'none';
  heart.style.transition = 'none';
  avatarDiv.appendChild(heart);
  const dx = (Math.random() - 0.5) * 70;
  const dy = -(30 + Math.random() * 70);
  const rot = (Math.random() - 0.5) * 70;
  const start = performance.now();
  function animate(now) {
    const t = Math.min(1, (now - start) / 900);
    const tx = dx * t;
    const ty = dy * t;
    heart.style.transform = `translate(${tx}px, ${ty}px) rotate(${rot * t}deg)`;
    heart.style.opacity = (1 - t).toFixed(2);
    if (t < 1) requestAnimationFrame(animate);
    else heart.remove();
  }
  requestAnimationFrame(animate);
}

// ========== 6. BACKGROUND GALAXY ==========
const canvas = document.getElementById('galaxyCanvas');
const ctx = canvas.getContext('2d');
let width, height;
let stars = [];
let meteors = [];

function resizeCanvas() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', () => {
  resizeCanvas();
  initStars(300);
});

function initStars(count) {
  stars = [];
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * width,
      y: Math.random() * height,
      r: Math.random() * 1.8 + 0.5,
      v: Math.random() * 0.3 + 0.05
    });
  }
}

function drawGalaxy() {
  if (!ctx) return;
  ctx.clearRect(0, 0, width, height);
  
  const grad = ctx.createRadialGradient(width * 0.7, height * 0.3, 0, width * 0.7, height * 0.3, Math.max(width, height) * 0.8);
  grad.addColorStop(0, 'rgba(0, 255, 255, 0.08)');
  grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, width, height);
  
  ctx.fillStyle = '#ffffff';
  for (let s of stars) {
    s.y += s.v;
    if (s.y > height) {
      s.y = 0;
      s.x = Math.random() * width;
    }
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  
  ctx.strokeStyle = '#00ffff';
  ctx.lineWidth = 1.8;
  for (let i = meteors.length - 1; i >= 0; i--) {
    const m = meteors[i];
    ctx.beginPath();
    ctx.moveTo(m.x, m.y);
    ctx.lineTo(m.x - m.len * 0.6, m.y + m.len);
    ctx.stroke();
    m.x += m.vx;
    m.y += m.vy;
    if (m.y > height || m.x < 0 || m.x > width) meteors.splice(i, 1);
  }
  
  if (Math.random() < 0.02) {
    meteors.push({
      x: Math.random() * width,
      y: Math.random() * height * 0.3,
      len: Math.random() * 70 + 40,
      vx: (Math.random() - 0.5) * 3,
      vy: Math.random() * 5 + 3
    });
  }
  
  requestAnimationFrame(drawGalaxy);
}

resizeCanvas();
initStars(300);
drawGalaxy();
</script>
</body>
